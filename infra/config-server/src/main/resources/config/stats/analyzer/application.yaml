kafka:
  bootstrap-servers: localhost:9092
  consumer:
    key-deserializer: org.apache.kafka.common.serialization.StringDeserializer

    user-actions-deserializer: ru.practicum.ewm.serializer.UserActionDeserializer
    actions-group-id: analyzer

    events-similarity-deserializer: ru.practicum.ewm.serializer.EventSimilarityDeserializer
    similarity-group-id: analyzer

topics:
  user-actions: stats.user-actions.v1
  events-similarity: stats.events-similarity.v1

grpc:
  server:
    port: 0
  client:
    analyzer:
      address: 'discovery:///analyzer'
      negotiationType: plaintext
      enableKeepAlive: true
      keepAliveWithoutCalls: true

spring:
  application:
    name: analyzer
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5439/analyzer-db
    username: postgres
    password: postgres
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true
